<ng-container *ngIf="showField">
  <ng-container [ngSwitch]="attribute?.type">
    <ng-template [ngSwitchCase]="DATA_TYPES.BOOLEAN">
      <mat-slide-toggle [formControl]="control" color="primary" class="padding" (change)="onChange()">
      </mat-slide-toggle>
    </ng-template>

    <!-- Hide the tooltip. It is quite annoying. matTooltip="control+enter to commit the change" -->
    <ng-template [ngSwitchCase]="DATA_TYPES.STRING">
      <mat-form-field (mouseenter)="mouseEnter()" (mouseleave)="mouseLeave()" class="form-field" appearance="outline"
        subscriptSizing="dynamic">
        <textarea style="height: fit-content" matInput cdkTextareaAutosize #autosize="cdkTextareaAutosize"
          cdkAutosizeMinRows="1" cdkAutosizeMaxRows="5" [formControl]="control" (change)="onChange()"
          (keydown)="onKeyDown($event)">
          </textarea>
        <!-- <div [formControl]="control" style="height: fit-content" matInput [innerHTML]= control.value>
        </div> -->
        <button *ngIf="showEditorButton" mat-icon-button color="primary" (click)="openTextEditorDialog()"
          matTooltip="Edit Text" class="edit-button">
          <mat-icon>edit</mat-icon>
        </button>
      </mat-form-field>
    </ng-template>

    <ng-template [ngSwitchCase]="DATA_TYPES.INTEGER">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="form-field">
        <input [formControl]="control" matInput type="number" step="1" (keydown)="preventNonIntegerInput($event)"
          (wheel)="$event.preventDefault()" (change)="onChange()">
      </mat-form-field>
    </ng-template>

    <ng-template [ngSwitchCase]="DATA_TYPES.FLOAT">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="form-field ">
        <input [formControl]="control" matInput type="number" step="any" (keydown)="preventNonFloatInput($event)"
          (wheel)="$event.preventDefault()" (change)="onChange()">
      </mat-form-field>
    </ng-template>

    <ng-template [ngSwitchCase]="DATA_TYPES.INSTANCE">
      <ng-container *ngIf="control.disabled; else editInstance">
        <ng-container *ngIf="value !== undefined">
          <a [routerLink]="getInstanceUrlRoot(value)" (click)="onInstanceLinkClicked(value)"
            [queryParamsHandling]="'preserve'" class="padding span-menu-trigger"
            style="cursor: pointer; text-decoration: underline;">
            {{value.displayName}}
            [{{value.dbId}}]
          </a><br>
        </ng-container>
      </ng-container>
      <ng-template #editInstance>
        <div (mouseenter)="mouseEnter()" (mouseleave)="mouseLeave()" class="valueRow"
          [ngClass]="{dragging: dragging, red: !color, green: color}">
          <!-- TODO: Also need to determine if it is required or disabled-->
          <ng-container *ngIf="value !== undefined; else elseblock">
            <div class="instance-value-wrapper">
              <a [routerLink]="getInstanceUrlRoot(value)" (click)="onInstanceLinkClicked(value)"
                #aTrigger="cdkContextMenuTriggerFor" [cdkContextMenuTriggerFor]="row_menu"
                (contextmenu)="onContextMenu($event)" (cdkContextMenuOpened)="onMenuOpened(aTrigger)"
                (cdkContextMenuClosed)="onMenuClosed()"
                class="padding value-link" style="cursor: pointer; text-decoration: underline;">
                {{value.displayName}}
                [{{value.dbId}}]
              </a>
              <button mat-mini-fab color="primary" class="row-action-fab" *ngIf="showActions"
                #valueMenuTrigger="cdkMenuTriggerFor" [cdkMenuTriggerFor]="row_menu"
                (cdkMenuOpened)="onMenuOpened(valueMenuTrigger)" (cdkMenuClosed)="onMenuClosed()"
                matTooltip="Edit value" aria-label="Edit value actions">
                <mat-icon>edit</mat-icon>
              </button>
            </div>
          </ng-container>
          <!-- For an empty instance slot, keep the original compact target but reveal a clear
          action button only while the cursor is in the row. Right-click is still supported. -->
          <ng-template #elseblock>
            <span #spanTrigger="cdkContextMenuTriggerFor" [cdkContextMenuTriggerFor]="row_menu"
              (contextmenu)="onContextMenu($event)" (cdkContextMenuOpened)="onMenuOpened(spanTrigger)"
              (cdkContextMenuClosed)="onMenuClosed()"
              class="span-menu-trigger empty-slot-target">
              <button mat-stroked-button class="add-value-button" *ngIf="showActions"
                #addMenuTrigger="cdkMenuTriggerFor" [cdkMenuTriggerFor]="row_menu"
                (cdkMenuOpened)="onMenuOpened(addMenuTrigger)" (cdkMenuClosed)="onMenuClosed()"
                [matTooltip]="attribute!.cardinality === '1' ? 'Set value' : 'Add value'"
                aria-label="Add value actions">
                <mat-icon>edit</mat-icon>
                Edit
              </button>
            </span>
          </ng-template>
        </div>
      </ng-template>
    </ng-template>

    <ng-template #row_menu>
      <app-action-menu (actionItem)="onEditAction($event)"
        [isSingledValued]="attribute!.cardinality === '1'"></app-action-menu>
    </ng-template>
  </ng-container>

  <!--  </ng-template>-->
</ng-container>
