<h2 class="dialog_title" mat-dialog-title cdkdraghandle>Select an Instance</h2>
<mat-dialog-content class="etched-content" style="height: 100%;">
  <!-- <div style="height: 65%"> -->
  <mat-label>Select a Schema Class: </mat-label>
  <mat-select [(value)]="selected" class="drop_down" (selectionChange)="onSelectionChange()">
    <ng-container>
      <mat-option *ngFor="let value of candidateClasses" [value]="value">
        {{value}}
      </mat-option>
    </ng-container>
  </mat-select>

  <mat-tab-group>
    <mat-tab label="Database Instances">
      <section class="scroll_panel options-panel" [style.max-height]="optionsPanelMaxHeight">
        <!-- For this list, we use a pagesize = 20 as the default for easy check: users are expected to do searching here. -->
        <app-instance-list-view [useRoute]="false" [showDeletion]="false" [showBatchEdit]="false" [setClassName]="this.selected" [isSelection]="true" [pageSize]="20"
          (clickEvent)="onSelectRow($event)" [actionButtons]="actionButtons" [needSecondaryActions]="false" [showBatchEditActions]="false"></app-instance-list-view>
      </section>
    </mat-tab>
    <mat-tab label="New and Updated Instances">
      <section class="scroll_panel options-panel" [style.max-height]="optionsPanelMaxHeight">
        <!-- For this list, we use a pagesize = 20 as the default for easy check: users are expected to do searching here. -->
        <app-instance-list-view [useRoute]="false" [showDeletion]="false" [showBatchEdit]="false" [isLocal]="true" [setClassName]="this.selected" [isSelection]="true" [pageSize]="20"
          (clickEvent)="onSelectRow($event)" [actionButtons]="actionButtons" [needSecondaryActions]="false"></app-instance-list-view>
      </section>
    </mat-tab>
  </mat-tab-group>

  <br>
  <mat-label>Selected Instances: </mat-label>
  <ng-container *ngIf="isSingleValued">
    <h4>*Only one value may be selected for {{attributeValue.attribute.name}}.</h4>
  </ng-container>
  <section class="scroll_panel selected-instances-panel" [style.max-height]="selectedPanelMaxHeight">
    <app-selected-instances-table *ngIf="this.selectedInstances.length > 0" [dataSource]="selectedInstances"
      (removeEvent)="onRemoveEvent($event)"></app-selected-instances-table>
  </section>
  <!-- </div> -->
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onOK()" cdkFocusInitial><mat-icon>check</mat-icon>OK</button>
  <button mat-button (click)="onCancel()"><mat-icon>close</mat-icon>Cancel</button>
</mat-dialog-actions>
