<h2 class="dialog_title" mat-dialog-title cdkdraghandle>Instances in batch:</h2>
<mat-dialog-content class="etched-content" style="height: 100%;">
  <mat-stepper class="etched-section" style="width: 100%; margin-top: 4px;" #batchEditStepper>
    <mat-step label="Attribute">
      <div style="display:flex; flex-direction: row; width: max-content; min-width: 300px; padding: 10px;">
        <mat-select class="drop_down" placeholder="Select an Attribute to Edit" #val [(value)]="selected"
          (selectionChange)="handleAttributeSelectionChange(val)">
          <mat-option class="action-button" *ngFor="let value of candidateAttributes" [value]="value">
            {{value.name}}
          </mat-option>
        </mat-select>
      </div>
      <div>
        <button mat-button matStepperNext [disabled]="selectedAttribute === undefined">Next</button>
      </div>
    </mat-step>

    <mat-step label="Edit Action" [completed]="selectedAction !== undefined">
      <ng-container *ngIf="selectedAttribute?.type === DATA_TYPES.STRING; else nonStringStep">
        <app-edit-menu (actionItem)="onSelectTextAction($event)"
          [isSingledValued]="selectedAttribute?.cardinality === '1'"></app-edit-menu>
      </ng-container>
      <ng-template #nonStringStep>
        <app-attribute-edit [attribute]="selectedAttribute" (newValueEvent)="onScalarAttributeEdit($event)"
          (editAction)="onInstanceAttributeEdit($event)">
        </app-attribute-edit>
      </ng-template>
      <div>
        <button mat-button matStepperPrevious>Back</button>
        <button mat-button matStepperNext
          [disabled]="selectedAttribute?.type !== DATA_TYPES.STRING || selectedAction === undefined">Next</button>
      </div>
    </mat-step>

    <mat-step label="Replacement Value">
      <ng-container *ngIf="selectedAttribute?.type === DATA_TYPES.STRING && (selectedAction === EDIT_ACTION.REPLACE_NEW || selectedAction === EDIT_ACTION.ADD_NEW); else noReplacementNeeded">
        <app-attribute-edit [attribute]="selectedAttribute" (newValueEvent)="onEditAction($event)">
        </app-attribute-edit>
      </ng-container>
      <ng-template #noReplacementNeeded>
        <div style="padding: 10px;">No additional value entry is required for the selected action.</div>
      </ng-template>
      <div>
        <button mat-button matStepperPrevious>Back</button>
      </div>
    </mat-step>
  </mat-stepper>


  <div style="flex-direction: column;">
    <div class="list-group">
      <mat-label class="list-label">Selected Instances:</mat-label>
      <section class="scroll_panel etched-section" style="padding-top: 0px; margin-top: 4px; max-height: 300px; overflow: auto; width: 100%;">
        <app-instance-list-table [showBookmark]="false" [showCheckMark]="false" [dataSource]="data" [actionButtons]="actionButtons"
          [blockRoute]="true" (urlClickEvent)="openInNewTab($event)"
          (actionEvent)="handleListTableAction($event)"></app-instance-list-table>
      </section>
    </div>

    <div class="list-group">
      <mat-label class="list-label">Removed Instances:</mat-label>
      <section class="scroll_panel etched-section" style="padding-top: 0px; margin-top: 4px; max-height: 300px; overflow: auto; width: 100%;">
        <app-instance-list-table [showBookmark]="false" [showCheckMark]="false" [dataSource]="removedInstances" [actionButtons]="removedActionButtons"
          [blockRoute]="true" (urlClickEvent)="openInNewTab($event)"
          (actionEvent)="handleRemovedTableAction($event)"></app-instance-list-table>
      </section>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onClose()" cdkFocusInitial>
    <mat-icon>check</mat-icon>
    Close
  </button>
</mat-dialog-actions>
